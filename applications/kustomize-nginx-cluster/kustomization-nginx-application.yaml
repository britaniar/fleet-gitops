apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kustomize-nginx
  namespace: flux-system
spec:
  interval: 1m
  targetNamespace: nginx-demo
  sourceRef:
    kind: GitRepository
    name: guestbook-demo
    namespace: flux-system
  path: "./kustomize-nginx/base"
  prune: true
  timeout: 3m
  suspend: true
